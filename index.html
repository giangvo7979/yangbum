<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chi Tiêu Cá Nhân</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#08090d;
  --sur:#0f1117;
  --sur2:#151820;
  --sur3:#1c2030;
  --sur4:#232840;
  --border:rgba(255,255,255,0.055);
  --border2:rgba(255,255,255,0.11);
  --border3:rgba(255,255,255,0.18);
  --text:#e8eaf4;
  --text2:#b0b8d4;
  --muted:#636d8a;
  --muted2:#404660;

  --green:#00e5a0;
  --green-dim:rgba(0,229,160,0.12);
  --green-glow:rgba(0,229,160,0.25);
  --red:#ff5c78;
  --red-dim:rgba(255,92,120,0.12);
  --red-glow:rgba(255,92,120,0.25);
  --blue:#4d9fff;
  --blue2:#b18aff;
  --amber:#ffb547;
  --amber-dim:rgba(255,181,71,0.12);

  --grad:linear-gradient(135deg,#4d9fff,#b18aff);
  --r:16px;--rs:10px;

  --font-head:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}

html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overflow-x:hidden}

/* ===== NOISE OVERLAY ===== */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.35;
}

/* ===== AMBIENT GLOW ===== */
.ambient{position:fixed;z-index:0;pointer-events:none;border-radius:50%;filter:blur(120px);opacity:.12}
.ambient-1{width:600px;height:600px;top:-200px;left:-100px;background:radial-gradient(circle,#4d9fff,transparent)}
.ambient-2{width:500px;height:500px;top:30%;right:-200px;background:radial-gradient(circle,#b18aff,transparent)}
.ambient-3{width:400px;height:400px;bottom:-100px;left:30%;background:radial-gradient(circle,#00e5a0,transparent);opacity:.07}

/* ===== HEADER ===== */
.hdr{
  background:rgba(15,17,23,0.85);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;height:60px;
}

.logo{display:flex;align-items:center;gap:12px;font-family:var(--font-head);font-size:18px;font-weight:800;letter-spacing:-0.5px}
.logo-ico{
  width:34px;height:34px;border-radius:10px;
  background:var(--grad);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  box-shadow:0 0 20px rgba(77,159,255,0.4);
}
.logo-text span{color:transparent;background:var(--grad);-webkit-background-clip:text;background-clip:text}

.api-pill{
  display:flex;align-items:center;gap:7px;
  font-size:11px;font-family:var(--font-mono);
  color:var(--muted);
  padding:5px 12px;border-radius:30px;
  border:1px solid var(--border);
  background:var(--sur2);
  transition:all .3s;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted2);transition:all .4s}
.dot.ok{background:var(--green);box-shadow:0 0 8px var(--green-glow)}
.dot.err{background:var(--red);box-shadow:0 0 8px var(--red-glow)}

/* ===== TABS ===== */
.tabs{
  background:rgba(15,17,23,0.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  display:flex;gap:0;position:sticky;top:60px;z-index:90;
}
.tab{
  padding:14px 22px;
  font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  font-family:var(--font-head);
  color:var(--muted);cursor:pointer;
  border:none;background:none;font-family:var(--font-head);
  border-bottom:2px solid transparent;
  transition:all .25s;position:relative;
}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--text);border-bottom-color:var(--blue)}
.tab.active::after{
  content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:40px;height:2px;
  background:var(--grad);
  border-radius:2px;
  filter:blur(4px);
}

/* ===== MAIN ===== */
.main{max-width:1160px;margin:0 auto;padding:28px 24px;position:relative;z-index:1}

/* ===== SUMMARY CARDS ===== */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}

.scard{
  background:var(--sur);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px;
  position:relative;overflow:hidden;
  transition:transform .25s,border-color .25s,box-shadow .25s;
}
.scard:hover{transform:translateY(-2px);border-color:var(--border2)}

/* Glowing top line */
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;opacity:.8}
.scard::after{content:'';position:absolute;top:0;left:0;right:0;height:40px;opacity:.06}

.scard.s-thu::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.scard.s-thu::after{background:var(--green)}
.scard.s-thu:hover{box-shadow:0 8px 32px rgba(0,229,160,0.1)}

.scard.s-chi::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}
.scard.s-chi::after{background:var(--red)}
.scard.s-chi:hover{box-shadow:0 8px 32px rgba(255,92,120,0.1)}

.scard.s-du::before{background:linear-gradient(90deg,transparent,var(--blue),var(--blue2),transparent)}
.scard.s-du::after{background:var(--grad)}
.scard.s-du:hover{box-shadow:0 8px 32px rgba(77,159,255,0.12)}

.scard.s-tiet::before{background:linear-gradient(90deg,transparent,var(--amber),transparent)}
.scard.s-tiet::after{background:var(--amber)}
.scard.s-tiet:hover{box-shadow:0 8px 32px rgba(255,181,71,0.1)}

.slabel{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-family:var(--font-head)}
.sval{font-family:var(--font-mono);font-size:20px;font-weight:600;letter-spacing:-1px;line-height:1.2}
.sval.green{color:var(--green)}.sval.red{color:var(--red)}.sval.blue{color:var(--text)}.sval.amber{color:var(--amber)}
.ssub{font-size:11px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:5px}
.sico{font-size:28px;position:absolute;right:16px;top:16px;opacity:.12;line-height:1}

/* ===== CONTENT GRID ===== */
.cgrid{display:grid;grid-template-columns:1fr 340px;gap:22px;align-items:start}

/* ===== SECTION HEADER ===== */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:13px;font-weight:700;letter-spacing:.3px;font-family:var(--font-head);text-transform:uppercase;color:var(--text2)}

/* ===== PANEL ===== */
.panel{
  background:var(--sur);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:22px;
}

/* ===== TOGGLE ===== */
.toggle{
  display:grid;grid-template-columns:1fr 1fr;
  background:var(--bg);
  border-radius:var(--rs);
  border:1px solid var(--border);
  padding:3px;
  margin-bottom:20px;
  gap:3px;
}
.tbtn{
  background:none;border:none;
  color:var(--muted);
  padding:9px;border-radius:7px;
  font-family:var(--font-head);font-size:12px;font-weight:700;
  letter-spacing:.4px;text-transform:uppercase;
  cursor:pointer;transition:all .25s;
}
.tbtn.active.chi{background:var(--red-dim);color:var(--red);box-shadow:inset 0 0 0 1px rgba(255,92,120,0.2)}
.tbtn.active.thu{background:var(--green-dim);color:var(--green);box-shadow:inset 0 0 0 1px rgba(0,229,160,0.2)}

/* ===== FORM ===== */
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;font-family:var(--font-head)}
.fc{
  width:100%;
  background:var(--bg);
  border:1px solid var(--border2);
  color:var(--text);
  padding:10px 14px;
  border-radius:var(--rs);
  font-family:var(--font-body);font-size:13px;
  outline:none;transition:all .2s;
  -webkit-appearance:none;
}
.fc:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(77,159,255,0.1)}
.fc::placeholder{color:var(--muted2)}
.fc option{background:var(--sur2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.sbtn{
  width:100%;padding:12px;border-radius:var(--rs);border:none;
  font-family:var(--font-head);font-size:12px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;transition:all .25s;margin-top:6px;
  position:relative;overflow:hidden;
}
.sbtn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;background:rgba(255,255,255,0.05)}
.sbtn:hover::before{opacity:1}
.sbtn.chi{
  background:var(--red-dim);color:var(--red);
  border:1px solid rgba(255,92,120,0.3);
}
.sbtn.chi:hover{box-shadow:0 4px 20px rgba(255,92,120,0.2)}
.sbtn.thu{
  background:var(--green-dim);color:var(--green);
  border:1px solid rgba(0,229,160,0.3);
}
.sbtn.thu:hover{box-shadow:0 4px 20px rgba(0,229,160,0.2)}
.sbtn:disabled{opacity:.4;cursor:not-allowed}

/* ===== FILTER CHIPS ===== */
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{
  background:var(--sur2);
  border:1px solid var(--border);
  color:var(--muted);
  padding:5px 13px;border-radius:30px;
  font-size:11px;font-weight:600;font-family:var(--font-head);
  text-transform:uppercase;letter-spacing:.4px;
  cursor:pointer;transition:all .2s;
}
.chip:hover{color:var(--text2);border-color:var(--border2)}
.chip.on{background:rgba(77,159,255,0.12);border-color:rgba(77,159,255,0.35);color:var(--blue)}

/* ===== TX LIST ===== */
.txlist{display:flex;flex-direction:column;gap:6px}

.txitem{
  background:var(--sur);border:1px solid var(--border);
  border-radius:var(--rs);
  padding:12px 14px;
  display:flex;align-items:center;gap:12px;
  animation:slideIn .22s ease both;
  transition:all .2s;
  cursor:default;
}
.txitem:hover{border-color:var(--border2);background:var(--sur2);transform:translateX(2px)}

@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.txicon{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.txinfo{flex:1;min-width:0}
.txname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txmeta{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--font-mono)}
.txamt{font-size:13px;font-weight:600;font-family:var(--font-mono);flex-shrink:0}
.txamt.thu{color:var(--green)}.txamt.chi{color:var(--red)}

.txdel{
  background:none;border:none;color:var(--muted2);
  cursor:pointer;font-size:13px;
  padding:5px 6px;border-radius:6px;
  opacity:0;transition:all .2s;line-height:1;
}
.txitem:hover .txdel{opacity:1}
.txdel:hover{color:var(--red);background:rgba(255,92,120,0.1)}

.empty{text-align:center;padding:50px;color:var(--muted)}
.empty .eico{font-size:42px;margin-bottom:12px;opacity:.5}
.empty p{font-size:13px;color:var(--muted)}

/* ===== PROGRESS BAR ===== */
.lbar{
  height:2px;
  background:var(--grad);
  width:0;transition:width .4s;
  border-radius:2px;margin-bottom:12px;
  box-shadow:0 0 8px var(--blue);
}

/* ===== SPIN ===== */
.spin{
  display:inline-block;width:11px;height:11px;
  border:2px solid transparent;border-top-color:currentColor;
  border-radius:50%;animation:sp .7s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes sp{to{transform:rotate(360deg)}}

/* ===== CHART TAB ===== */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.cpanel{background:var(--sur);border:1px solid var(--border);border-radius:var(--r);padding:22px}
.cptitle{
  font-size:10px;font-weight:700;color:var(--muted);
  margin-bottom:18px;text-transform:uppercase;letter-spacing:.8px;
  font-family:var(--font-head);
  display:flex;align-items:center;gap:8px;
}
.cptitle::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--grad)}
.chart-wrap{position:relative;height:220px}

.cat-list{display:flex;flex-direction:column;gap:10px}
.cat-row{display:flex;align-items:center;gap:12px}
.cat-ico{font-size:16px;flex-shrink:0}
.cat-label{font-size:12px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)}
.cat-bar-wrap{flex:2;height:4px;background:var(--sur3);border-radius:2px;overflow:hidden}
.cat-bar{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.23,1,.32,1)}
.cat-pct{font-size:10px;color:var(--muted);font-family:var(--font-mono);flex-shrink:0;width:28px;text-align:right}
.cat-amt{font-size:11px;font-family:var(--font-mono);color:var(--muted);flex-shrink:0;min-width:72px;text-align:right}

/* ===== MONTH NAV ===== */
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.mnbtn{
  background:var(--sur);border:1px solid var(--border);
  color:var(--muted);
  padding:7px 16px;border-radius:var(--rs);
  font-family:var(--font-head);font-size:12px;font-weight:700;
  letter-spacing:.3px;cursor:pointer;transition:all .2s;
}
.mnbtn:hover{color:var(--text);border-color:var(--border2)}
.mntitle{font-size:16px;font-weight:800;flex:1;text-align:center;font-family:var(--font-head);letter-spacing:-.3px}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--sur2);
  border:1px solid var(--border2);
  border-radius:var(--rs);
  padding:12px 18px;font-size:12px;
  font-family:var(--font-mono);
  transform:translateY(80px) scale(.96);opacity:0;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  z-index:9999;max-width:300px;
  backdrop-filter:blur(20px);
}
.toast.show{transform:translateY(0) scale(1);opacity:1}
.toast.ok{border-color:rgba(0,229,160,.35);box-shadow:0 4px 20px rgba(0,229,160,.1)}
.toast.err{border-color:rgba(255,92,120,.35);box-shadow:0 4px 20px rgba(255,92,120,.1)}

/* ===== DIVIDER ===== */
.divider{height:1px;background:var(--border);margin:16px 0}

/* ===== STAT MINI ===== */
.stat-row{display:flex;justify-content:space-between;margin-bottom:10px}
.stat-mini{font-size:11px;color:var(--muted)}
.stat-mini strong{color:var(--text2);font-family:var(--font-mono)}

@media(max-width:860px){
  .sum-grid{grid-template-columns:1fr 1fr}
  .cgrid{grid-template-columns:1fr}
  .chart-grid{grid-template-columns:1fr}
  .hdr{padding:0 16px}
  .main{padding:18px 14px}
  .tabs{padding:0 14px}
}
</style>
</head>
<body>

<!-- Ambient Glows -->
<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>
<div class="ambient ambient-3"></div>

<header class="hdr">
  <div class="logo">
    <div class="logo-ico">💰</div>
    <div class="logo-text">Chi Tiêu Của<span> Bum</span></div>
  </div>
  <div class="api-pill" id="apiStatus">
    <span class="dot" id="apiDot"></span>
    <span id="apiText">Chưa kết nối</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('home',this)">📋 &nbsp;Giao dịch</button>
  <button class="tab" onclick="switchTab('chart',this)">📊 &nbsp;Thống kê</button>
</div>

<!-- TAB HOME -->
<div id="tab-home" class="main">

  <div class="sum-grid">
    <div class="scard s-thu">
      <div class="sico">💚</div>
      <div class="slabel">Thu nhập tháng</div>
      <div class="sval green" id="sThu">0đ</div>
      <div class="ssub" id="sThuC"><span>0 khoản</span></div>
    </div>
    <div class="scard s-chi">
      <div class="sico">🔴</div>
      <div class="slabel">Chi tiêu tháng</div>
      <div class="sval red" id="sChi">0đ</div>
      <div class="ssub" id="sChiC"><span>0 khoản</span></div>
    </div>
    <div class="scard s-du">
      <div class="sico">💎</div>
      <div class="slabel">Số dư hiện tại</div>
      <div class="sval blue" id="sDu">0đ</div>
      <div class="ssub" id="sDuS">—</div>
    </div>
    <div class="scard s-tiet">
      <div class="sico">📦</div>
      <div class="slabel">Tỷ lệ tiết kiệm</div>
      <div class="sval amber" id="sTiet">0%</div>
      <div class="ssub">so với thu nhập</div>
    </div>
  </div>

  <div class="cgrid">
    <!-- LEFT: TX LIST -->
    <div>
      <div class="sec-hdr">
        <div class="sec-title">Lịch sử giao dịch</div>
        <button class="chip" onclick="loadData()">↻ &nbsp;Tải lại</button>
      </div>
      <div class="fbar">
        <button class="chip on" onclick="setFilter('all',this)">Tất cả</button>
        <button class="chip" onclick="setFilter('thu',this)">💵 Thu</button>
        <button class="chip" onclick="setFilter('chi',this)">💸 Chi</button>
        <button class="chip" onclick="setFilter('Ăn uống',this)">🍜 Ăn uống</button>
        <button class="chip" onclick="setFilter('Du lịch',this)">✈️ Du lịch</button>
        <button class="chip" onclick="setFilter('Xăng xe',this)">⛽ Xăng xe</button>
        <button class="chip" onclick="setFilter('Mua sắm',this)">🛍️ Mua sắm</button>
        <button class="chip" onclick="setFilter('Cho mẹ',this)">💝 Cho mẹ</button>
      </div>
      <div class="lbar" id="lbar"></div>
      <div class="txlist" id="txList">
        <div class="empty">
          <div class="eico">📂</div>
          <p>Điền API URL vào code rồi tải lại trang</p>
        </div>
      </div>
    </div>

    <!-- RIGHT: FORM -->
    <div class="panel" style="position:sticky;top:122px">
      <div class="toggle">
        <button class="tbtn active chi" id="btnChi" onclick="setType('chi',this)">💸 &nbsp;Chi tiêu</button>
        <button class="tbtn thu" id="btnThu" onclick="setType('thu',this)">💵 &nbsp;Thu nhập</button>
      </div>

      <div class="fg">
        <label class="fl">Danh mục</label>
        <select class="fc" id="fCat"></select>
      </div>
      <div class="fg">
        <label class="fl">Mô tả</label>
        <input type="text" class="fc" id="fDesc" placeholder="VD: Ăn trưa, đổ xăng...">
      </div>
      <div class="row2">
        <div class="fg">
          <label class="fl">Số tiền (VND)</label>
          <input type="number" class="fc" id="fAmt" placeholder="150000" min="0">
        </div>
        <div class="fg">
          <label class="fl">Ngày</label>
          <input type="date" class="fc" id="fDate">
        </div>
      </div>
      <div class="fg">
        <label class="fl">Ghi chú</label>
        <input type="text" class="fc" id="fNote" placeholder="Tùy chọn...">
      </div>

      <button class="sbtn chi" id="subBtn" onclick="addTx()">➕ &nbsp;Thêm Chi Tiêu</button>
    </div>
  </div>
</div>

<!-- TAB CHART -->
<div id="tab-chart" class="main" style="display:none">
  <div class="month-nav">
    <button class="mnbtn" onclick="changeMonth(-1)">← Trước</button>
    <div class="mntitle" id="mnTitle">Tháng này</div>
    <button class="mnbtn" onclick="changeMonth(1)">Tiếp →</button>
  </div>

  <div class="chart-grid">
    <div class="cpanel">
      <div class="cptitle">Thu &amp; Chi theo tuần</div>
      <div class="chart-wrap"><canvas id="chartBar"></canvas></div>
    </div>
    <div class="cpanel">
      <div class="cptitle">Cơ cấu chi tiêu</div>
      <div class="chart-wrap"><canvas id="chartPie"></canvas></div>
    </div>
  </div>

  <div class="panel">
    <div class="sec-hdr" style="margin-bottom:18px">
      <div class="sec-title">Chi tiêu theo danh mục</div>
    </div>
    <div class="cat-list" id="catList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycby1RkQdveOX6WObUTFJDCbE0SgVvffKI2l7E8ISStPdhaNyUWg-UaDpjpiOlGONYLbF/exec';

const CATS_CHI = ['Ăn uống','Du lịch','Xăng xe','Mua sắm','Cho mẹ','Hóa đơn','Giải trí','Sức khỏe','Giáo dục','Khác'];
const CATS_THU = ['Lương','Thưởng','Phụ cấp','Freelance','Đầu tư','Khác'];

const CAT_ICON = {
  'Ăn uống':'🍜','Du lịch':'✈️','Xăng xe':'⛽','Mua sắm':'🛍️','Cho mẹ':'💝',
  'Hóa đơn':'📄','Giải trí':'🎮','Sức khỏe':'💊','Giáo dục':'📚',
  'Lương':'💵','Thưởng':'🎁','Phụ cấp':'💼','Freelance':'💻','Đầu tư':'📈','Khác':'📦'
};
const CAT_COLOR = {
  'Ăn uống':'#ff5c78','Du lịch':'#4d9fff','Xăng xe':'#ffb547','Mua sắm':'#b18aff',
  'Cho mẹ':'#f472b6','Hóa đơn':'#94a3b8','Giải trí':'#fb923c','Sức khỏe':'#00e5a0',
  'Giáo dục':'#38bdf8','Lương':'#00e5a0','Thưởng':'#4d9fff','Phụ cấp':'#b18aff',
  'Freelance':'#ffb547','Đầu tư':'#60a5fa','Khác':'#404660'
};

let txs = [], curType = 'chi', curFilter = 'all', curMonth = new Date();
let chartBar = null, chartPie = null;

const fmt = n => new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND'}).format(n);
const fmtShort = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'K' : n;

function init() {
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  updateCatSelect();
  checkApi();
  loadData();
}

function checkApi() {
  const dot = document.getElementById('apiDot');
  const txt = document.getElementById('apiText');
  if (!API_URL || API_URL === 'PASTE_YOUR_APPS_SCRIPT_URL_HERE') {
    dot.className = 'dot err'; txt.textContent = 'Chưa cấu hình';
  } else {
    dot.className = 'dot ok'; txt.textContent = 'API · Live';
  }
}

function updateCatSelect() {
  const cats = curType === 'chi' ? CATS_CHI : CATS_THU;
  document.getElementById('fCat').innerHTML = cats.map(c =>
    `<option value="${c}">${CAT_ICON[c]||'📦'} ${c}</option>`).join('');
}

function setType(type, btn) {
  curType = type;
  document.getElementById('btnChi').classList.remove('active');
  document.getElementById('btnThu').classList.remove('active');
  btn.classList.add('active');
  updateCatSelect();
  const sb = document.getElementById('subBtn');
  sb.className = 'sbtn ' + type;
  sb.textContent = type === 'chi' ? '➕  Thêm Chi Tiêu' : '➕  Thêm Thu Nhập';
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
  renderTxs();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-home').style.display = tab === 'home' ? '' : 'none';
  document.getElementById('tab-chart').style.display = tab === 'chart' ? '' : 'none';
  if (tab === 'chart') renderCharts();
}

async function loadData() {
  if (!API_URL || API_URL === 'PASTE_YOUR_APPS_SCRIPT_URL_HERE') return;
  const bar = document.getElementById('lbar');
  bar.style.width = '60%';
  try {
    const r = await fetch(`${API_URL}?action=getAll`);
    const d = await r.json();
    bar.style.width = '100%';
    setTimeout(() => bar.style.width = '0', 400);
    if (d.success) { txs = d.data || []; renderTxs(); updateSummary(); }
  } catch { bar.style.width='0'; toast('❌ Không thể tải dữ liệu','err'); }
}

function renderTxs() {
  const list = document.getElementById('txList');
  let data = [...txs];
  if (curFilter === 'thu') data = data.filter(t => t.type === 'thu');
  else if (curFilter === 'chi') data = data.filter(t => t.type === 'chi');
  else if (curFilter !== 'all') data = data.filter(t => t.category === curFilter);

  if (!data.length) {
    list.innerHTML = `<div class="empty"><div class="eico">🔍</div><p>Không có giao dịch nào</p></div>`;
    return;
  }
  list.innerHTML = data.slice(0,60).map((t,i) => `
    <div class="txitem" style="animation-delay:${i*0.03}s">
      <div class="txicon" style="background:${CAT_COLOR[t.category]||'#404660'}1a">${CAT_ICON[t.category]||'📦'}</div>
      <div class="txinfo">
        <div class="txname">${t.desc||t.category}</div>
        <div class="txmeta">${t.category} · ${t.date}${t.note?' · '+t.note:''}</div>
      </div>
      <div class="txamt ${t.type}">${t.type==='thu'?'+':'-'}${fmt(t.amount)}</div>
      <button class="txdel" onclick="delTx('${t.id}')">✕</button>
    </div>`).join('');
}

function updateSummary() {
  const now = new Date();
  const month = txs.filter(t => {
    const d = new Date(t.date);
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  });
  const thu = month.filter(t=>t.type==='thu').reduce((s,t)=>s+t.amount,0);
  const chi = month.filter(t=>t.type==='chi').reduce((s,t)=>s+t.amount,0);
  const du = thu - chi;
  const tiet = thu > 0 ? Math.round((du/thu)*100) : 0;

  document.getElementById('sThu').textContent = fmt(thu);
  document.getElementById('sChi').textContent = fmt(chi);
  document.getElementById('sDu').textContent = fmt(du);
  document.getElementById('sTiet').textContent = tiet + '%';
  document.getElementById('sThuC').innerHTML = `<span>${month.filter(t=>t.type==='thu').length} khoản</span>`;
  document.getElementById('sChiC').innerHTML = `<span>${month.filter(t=>t.type==='chi').length} khoản</span>`;
  document.getElementById('sDuS').innerHTML = du >= 0
    ? '<span style="color:var(--green)">▲ Còn dư tốt</span>'
    : '<span style="color:var(--red)">▼ Vượt ngân sách</span>';
}

async function addTx() {
  if (!API_URL || API_URL === 'PASTE_YOUR_APPS_SCRIPT_URL_HERE') {
    toast('⚠️ Hãy điền API_URL vào trong code','err'); return;
  }
  const desc = document.getElementById('fDesc').value.trim();
  const amt = parseFloat(document.getElementById('fAmt').value);
  const cat = document.getElementById('fCat').value;
  const date = document.getElementById('fDate').value;
  const note = document.getElementById('fNote').value.trim();
  if (!desc) { toast('⚠️ Nhập mô tả','err'); return; }
  if (!amt || amt <= 0) { toast('⚠️ Nhập số tiền hợp lệ','err'); return; }

  const btn = document.getElementById('subBtn');
  const orig = btn.textContent;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Đang lưu...';
  try {
    const r = await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'add',type:curType,category:cat,desc,amount:amt,date,note})});
    const d = await r.json();
    if (d.success) {
      toast('✅ Đã thêm thành công!','ok');
      document.getElementById('fDesc').value='';
      document.getElementById('fAmt').value='';
      document.getElementById('fNote').value='';
      loadData();
    } else toast('❌ Lỗi: '+d.error,'err');
  } catch { toast('❌ Không kết nối được','err'); }
  btn.disabled=false; btn.textContent=orig;
}

async function delTx(id) {
  if (!confirm('Xóa giao dịch này?')) return;
  try {
    const r = await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'delete',id})});
    const d = await r.json();
    if (d.success) { toast('🗑️ Đã xóa','ok'); loadData(); }
    else toast('❌ '+d.error,'err');
  } catch { toast('❌ Lỗi xóa','err'); }
}

// CHARTS
function getMonthData() {
  return txs.filter(t => {
    const d = new Date(t.date);
    return d.getMonth()===curMonth.getMonth() && d.getFullYear()===curMonth.getFullYear();
  });
}

function renderCharts() {
  const mn = curMonth;
  document.getElementById('mnTitle').textContent = `Tháng ${mn.getMonth()+1} / ${mn.getFullYear()}`;
  const data = getMonthData();
  renderBarChart(data, mn);
  renderPieChart(data);
  renderCatList(data);
}

function changeMonth(dir) {
  curMonth = new Date(curMonth.getFullYear(), curMonth.getMonth()+dir, 1);
  renderCharts();
}

function renderBarChart(data, mn) {
  const weeks = ['Tuần 1','Tuần 2','Tuần 3','Tuần 4'];
  const thu = [0,0,0,0], chi = [0,0,0,0];
  data.forEach(t => {
    const day = new Date(t.date).getDate();
    const w = Math.min(Math.floor((day-1)/7), 3);
    if (t.type==='thu') thu[w]+=t.amount;
    else chi[w]+=t.amount;
  });

  if (chartBar) chartBar.destroy();
  const ctx = document.getElementById('chartBar').getContext('2d');
  chartBar = new Chart(ctx, {
    type:'bar',
    data:{
      labels: weeks,
      datasets:[
        {label:'Thu nhập',data:thu,backgroundColor:'rgba(0,229,160,.65)',borderRadius:6,borderSkipped:false},
        {label:'Chi tiêu',data:chi,backgroundColor:'rgba(255,92,120,.65)',borderRadius:6,borderSkipped:false}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#636d8a',font:{size:11,family:'JetBrains Mono'}}}},
      scales:{
        x:{ticks:{color:'#636d8a',font:{size:11}},grid:{color:'rgba(255,255,255,0.03)'}},
        y:{ticks:{color:'#636d8a',font:{size:11},callback:v=>fmtShort(v)},grid:{color:'rgba(255,255,255,0.03)'}}
      }
    }
  });
}

function renderPieChart(data) {
  const chi = data.filter(t=>t.type==='chi');
  const bycat = {};
  chi.forEach(t=>{ bycat[t.category]=(bycat[t.category]||0)+t.amount; });
  const labels = Object.keys(bycat);
  const vals = labels.map(l=>bycat[l]);
  const colors = labels.map(l=>CAT_COLOR[l]||'#404660');

  if (chartPie) chartPie.destroy();
  const ctx = document.getElementById('chartPie').getContext('2d');
  chartPie = new Chart(ctx, {
    type:'doughnut',
    data:{labels, datasets:[{data:vals,backgroundColor:colors,borderWidth:0,hoverOffset:10,borderRadius:4}]},
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'68%',
      plugins:{
        legend:{position:'right',labels:{color:'#636d8a',font:{size:10,family:'JetBrains Mono'},boxWidth:9,padding:10}},
        tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)}`}}
      }
    }
  });
}

function renderCatList(data) {
  const chi = data.filter(t=>t.type==='chi');
  const bycat = {};
  chi.forEach(t=>{ bycat[t.category]=(bycat[t.category]||0)+t.amount; });
  const total = Object.values(bycat).reduce((s,v)=>s+v,0)||1;
  const sorted = Object.entries(bycat).sort((a,b)=>b[1]-a[1]);

  document.getElementById('catList').innerHTML = sorted.length
    ? sorted.map(([cat,amt])=>`
      <div class="cat-row">
        <div class="cat-ico">${CAT_ICON[cat]||'📦'}</div>
        <div class="cat-label">${cat}</div>
        <div class="cat-bar-wrap">
          <div class="cat-bar" style="width:${Math.round(amt/total*100)}%;background:${CAT_COLOR[cat]||'#404660'}"></div>
        </div>
        <div class="cat-pct">${Math.round(amt/total*100)}%</div>
        <div class="cat-amt">${fmt(amt)}</div>
      </div>`).join('')
    : '<div style="color:var(--muted);font-size:12px;text-align:center;padding:24px;font-family:var(--font-mono)">Chưa có chi tiêu tháng này</div>';
}

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${type} show`;
  setTimeout(()=>el.classList.remove('show'),3000);
}

init();
</script>
</body>
</html>
