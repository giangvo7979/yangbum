<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chi Tiêu Cá Nhân</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--sur:#161921;--sur2:#1e2230;--sur3:#252a3a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#eef0f8;--muted:#7a84a0;--muted2:#555e78;
  --blue:#5b8df5;--blue2:#a78bfa;--green:#34d399;--red:#f87171;--amber:#fbbf24;
  --r:12px;--rs:8px;
}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* HEADER */
.hdr{background:var(--sur);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700}
.logo-ico{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--blue2));display:flex;align-items:center;justify-content:center;font-size:15px}
.api-wrap{display:flex;align-items:center;gap:8px}
.api-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);padding:6px 12px;border-radius:20px;border:1px solid var(--border)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted2)}
.dot.ok{background:var(--green)}
.dot.err{background:var(--red)}

/* TABS */
.tabs{display:flex;gap:0;background:var(--sur2);border-bottom:1px solid var(--border);padding:0 24px}
.tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* MAIN */
.main{max-width:1120px;margin:0 auto;padding:24px 20px}

/* SUMMARY CARDS */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.scard{background:var(--sur);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.scard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.scard.s-thu::after{background:var(--green)}
.scard.s-chi::after{background:var(--red)}
.scard.s-du::after{background:linear-gradient(90deg,var(--blue),var(--blue2))}
.scard.s-tiet::after{background:var(--amber)}
.slabel{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sval{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;letter-spacing:-1px}
.sval.green{color:var(--green)}.sval.red{color:var(--red)}.sval.blue{color:var(--text)}.sval.amber{color:var(--amber)}
.ssub{font-size:11px;color:var(--muted);margin-top:5px}

/* CONTENT GRID */
.cgrid{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}

/* PANEL */
.panel{background:var(--sur);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.ptitle{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* TYPE TOGGLE */
.toggle{display:grid;grid-template-columns:1fr 1fr;background:var(--sur2);border-radius:var(--rs);padding:3px;margin-bottom:18px}
.tbtn{background:none;border:none;color:var(--muted);padding:8px;border-radius:6px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.tbtn.active.chi{background:rgba(248,113,113,.15);color:var(--red)}
.tbtn.active.thu{background:rgba(52,211,153,.15);color:var(--green)}

/* FORM */
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.fc{width:100%;background:var(--sur2);border:1px solid var(--border);color:var(--text);padding:9px 13px;border-radius:var(--rs);font-family:inherit;font-size:13px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.fc:focus{border-color:var(--blue)}
.fc::placeholder{color:var(--muted2)}
.fc option{background:var(--sur2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sbtn{width:100%;padding:11px;border-radius:var(--rs);border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px}
.sbtn.chi{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.sbtn.chi:hover{background:rgba(248,113,113,.25)}
.sbtn.thu{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.sbtn.thu:hover{background:rgba(52,211,153,.25)}
.sbtn:disabled{opacity:.5;cursor:not-allowed}

/* FILTER */
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{background:var(--sur2);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.chip:hover,.chip.on{background:rgba(91,141,245,.15);border-color:var(--blue);color:var(--blue)}

/* TX LIST */
.txlist{display:flex;flex-direction:column;gap:7px}
.txitem{background:var(--sur);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:center;gap:12px;animation:si .25s ease;transition:border-color .2s}
.txitem:hover{border-color:var(--border2)}
@keyframes si{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.txicon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.txinfo{flex:1;min-width:0}
.txname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txmeta{font-size:11px;color:var(--muted);margin-top:2px}
.txamt{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;flex-shrink:0}
.txamt.thu{color:var(--green)}.txamt.chi{color:var(--red)}
.txdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px 6px;border-radius:6px;opacity:0;transition:all .2s;line-height:1}
.txitem:hover .txdel{opacity:1}
.txdel:hover{color:var(--red);background:rgba(248,113,113,.1)}

.empty{text-align:center;padding:40px;color:var(--muted)}
.empty div{font-size:36px;margin-bottom:10px}

/* CHART TAB */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.cpanel{background:var(--sur);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.cptitle{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px}
.chart-wrap{position:relative;height:220px}
.cat-list{display:flex;flex-direction:column;gap:8px}
.cat-row{display:flex;align-items:center;gap:10px}
.cat-label{font-size:12px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-bar-wrap{flex:2;height:6px;background:var(--sur2);border-radius:3px;overflow:hidden}
.cat-bar{height:100%;border-radius:3px;transition:width .6s ease}
.cat-amt{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);flex-shrink:0;min-width:70px;text-align:right}

/* MONTH SELECTOR */
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.mnbtn{background:var(--sur2);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:var(--rs);font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s}
.mnbtn:hover{color:var(--text);border-color:var(--border2)}
.mntitle{font-size:15px;font-weight:600;flex:1;text-align:center}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--sur2);border:1px solid var(--border2);border-radius:var(--rs);padding:11px 16px;font-size:13px;transform:translateY(70px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:9999;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:rgba(52,211,153,.3)}.toast.err{border-color:rgba(248,113,113,.3)}

/* LOADING */
.lbar{height:2px;background:linear-gradient(90deg,var(--blue),var(--blue2));width:0;transition:width .4s;border-radius:2px;margin-bottom:14px}
.spin{display:inline-block;width:12px;height:12px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:800px){
  .sum-grid{grid-template-columns:1fr 1fr}
  .cgrid{grid-template-columns:1fr}
  .chart-grid{grid-template-columns:1fr}
  .hdr{padding:12px 16px}
  .main{padding:16px 12px}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">
    <div class="logo-ico">💰</div>
    Chi Tiêu Cá Nhân
  </div>
  <div class="api-wrap">
    <div class="api-status" id="apiStatus">
      <span class="dot" id="apiDot"></span>
      <span id="apiText">Chưa kết nối</span>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('home',this)">📋 Giao dịch</button>
  <button class="tab" onclick="switchTab('chart',this)">📊 Thống kê</button>
</div>

<!-- TAB HOME -->
<div id="tab-home" class="main">

  <div class="sum-grid">
    <div class="scard s-thu">
      <div class="slabel">💚 Thu nhập tháng</div>
      <div class="sval green" id="sThu">0đ</div>
      <div class="ssub" id="sThuC">0 khoản</div>
    </div>
    <div class="scard s-chi">
      <div class="slabel">❤️ Chi tiêu tháng</div>
      <div class="sval red" id="sChi">0đ</div>
      <div class="ssub" id="sChiC">0 khoản</div>
    </div>
    <div class="scard s-du">
      <div class="slabel">💎 Số dư</div>
      <div class="sval blue" id="sDu">0đ</div>
      <div class="ssub" id="sDuS">—</div>
    </div>
    <div class="scard s-tiet">
      <div class="slabel">📦 Tiết kiệm %</div>
      <div class="sval amber" id="sTiet">0%</div>
      <div class="ssub">so với thu nhập</div>
    </div>
  </div>

  <div class="cgrid">
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:14px;font-weight:600">Lịch sử giao dịch</div>
        <button class="chip" onclick="loadData()">🔄 Tải lại</button>
      </div>
      <div class="fbar">
        <button class="chip on" onclick="setFilter('all',this)">Tất cả</button>
        <button class="chip" onclick="setFilter('thu',this)">💵 Thu nhập</button>
        <button class="chip" onclick="setFilter('chi',this)">💸 Chi tiêu</button>
        <button class="chip" onclick="setFilter('Ăn uống',this)">🍜 Ăn uống</button>
        <button class="chip" onclick="setFilter('Du lịch',this)">✈️ Du lịch</button>
        <button class="chip" onclick="setFilter('Xăng xe',this)">⛽ Xăng xe</button>
        <button class="chip" onclick="setFilter('Mua sắm',this)">🛍️ Mua sắm</button>
        <button class="chip" onclick="setFilter('Cho mẹ',this)">💝 Cho mẹ</button>
      </div>
      <div class="lbar" id="lbar"></div>
      <div class="txlist" id="txList">
        <div class="empty"><div>📂</div><p>Điền API URL vào code rồi tải lại trang</p></div>
      </div>
    </div>

    <div class="panel" style="position:sticky;top:64px">
      <div class="ptitle">✏️ Thêm giao dịch</div>
      <div class="toggle">
        <button class="tbtn active chi" id="btnChi" onclick="setType('chi',this)">💸 Chi tiêu</button>
        <button class="tbtn thu" id="btnThu" onclick="setType('thu',this)">💵 Thu nhập</button>
      </div>
      <div class="fg">
        <label class="fl">Danh mục</label>
        <select class="fc" id="fCat"></select>
      </div>
      <div class="fg">
        <label class="fl">Mô tả</label>
        <input type="text" class="fc" id="fDesc" placeholder="VD: Ăn trưa, đổ xăng...">
      </div>
      <div class="row2">
        <div class="fg">
          <label class="fl">Số tiền (VND)</label>
          <input type="number" class="fc" id="fAmt" placeholder="150000" min="0">
        </div>
        <div class="fg">
          <label class="fl">Ngày</label>
          <input type="date" class="fc" id="fDate">
        </div>
      </div>
      <div class="fg">
        <label class="fl">Ghi chú (tùy chọn)</label>
        <input type="text" class="fc" id="fNote" placeholder="Ghi chú thêm...">
      </div>
      <button class="sbtn chi" id="subBtn" onclick="addTx()">➕ Thêm Chi Tiêu</button>
    </div>
  </div>
</div>

<!-- TAB CHART -->
<div id="tab-chart" class="main" style="display:none">
  <div class="month-nav">
    <button class="mnbtn" onclick="changeMonth(-1)">← Trước</button>
    <div class="mntitle" id="mnTitle">Tháng này</div>
    <button class="mnbtn" onclick="changeMonth(1)">Tiếp →</button>
  </div>

  <div class="chart-grid">
    <div class="cpanel">
      <div class="cptitle">📈 Thu - Chi theo tuần</div>
      <div class="chart-wrap"><canvas id="chartBar"></canvas></div>
    </div>
    <div class="cpanel">
      <div class="cptitle">🥧 Cơ cấu chi tiêu</div>
      <div class="chart-wrap"><canvas id="chartPie"></canvas></div>
    </div>
  </div>

  <div class="panel">
    <div class="ptitle">📂 Chi tiêu theo danh mục</div>
    <div class="cat-list" id="catList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// ⚙️ CẤU HÌNH - Điền Apps Script URL của bạn vào đây
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycby1RkQdveOX6WObUTFJDCbE0SgVvffKI2l7E8ISStPdhaNyUWg-UaDpjpiOlGONYLbF/exec';
// ============================================================

const CATS_CHI = ['Ăn uống','Du lịch','Xăng xe','Mua sắm','Cho mẹ','Hóa đơn','Giải trí','Sức khỏe','Giáo dục','Khác'];
const CATS_THU = ['Lương','Thưởng','Phụ cấp','Freelance','Đầu tư','Khác'];

const CAT_ICON = {
  'Ăn uống':'🍜','Du lịch':'✈️','Xăng xe':'⛽','Mua sắm':'🛍️','Cho mẹ':'💝',
  'Hóa đơn':'📄','Giải trí':'🎮','Sức khỏe':'💊','Giáo dục':'📚',
  'Lương':'💵','Thưởng':'🎁','Phụ cấp':'💼','Freelance':'💻','Đầu tư':'📈','Khác':'📦'
};
const CAT_COLOR = {
  'Ăn uống':'#f87171','Du lịch':'#60a5fa','Xăng xe':'#fbbf24','Mua sắm':'#a78bfa',
  'Cho mẹ':'#f472b6','Hóa đơn':'#94a3b8','Giải trí':'#fb923c','Sức khỏe':'#34d399',
  'Giáo dục':'#38bdf8','Lương':'#34d399','Thưởng':'#5b8df5','Phụ cấp':'#a78bfa',
  'Freelance':'#fbbf24','Đầu tư':'#60a5fa','Khác':'#64748b'
};

let txs = [], curType = 'chi', curFilter = 'all', curMonth = new Date();
let chartBar = null, chartPie = null;

const fmt = n => new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND'}).format(n);
const fmtShort = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'K' : n;

function init() {
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  updateCatSelect();
  checkApi();
  loadData();
}

function checkApi() {
  const dot = document.getElementById('apiDot');
  const txt = document.getElementById('apiText');
  if (!API_URL || API_URL === 'PASTE_YOUR_APPS_SCRIPT_URL_HERE') {
    dot.className = 'dot err'; txt.textContent = 'Chưa cấu hình API';
  } else {
    dot.className = 'dot ok'; txt.textContent = 'Đã kết nối';
  }
}

function updateCatSelect() {
  const cats = curType === 'chi' ? CATS_CHI : CATS_THU;
  document.getElementById('fCat').innerHTML = cats.map(c =>
    `<option value="${c}">${CAT_ICON[c]||'📦'} ${c}</option>`).join('');
}

function setType(type, btn) {
  curType = type;
  document.getElementById('btnChi').classList.remove('active');
  document.getElementById('btnThu').classList.remove('active');
  btn.classList.add('active');
  updateCatSelect();
  const sb = document.getElementById('subBtn');
  sb.className = 'sbtn ' + type;
  sb.textContent = type === 'chi' ? '➕ Thêm Chi Tiêu' : '➕ Thêm Thu Nhập';
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
  renderTxs();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-home').style.display = tab === 'home' ? '' : 'none';
  document.getElementById('tab-chart').style.display = tab === 'chart' ? '' : 'none';
  if (tab === 'chart') renderCharts();
}

async function loadData() {
  if (!API_URL || API_URL === 'PASTE_YOUR_APPS_SCRIPT_URL_HERE') return;
  const bar = document.getElementById('lbar');
  bar.style.width = '50%';
  try {
    const r = await fetch(`${API_URL}?action=getAll`);
    const d = await r.json();
    bar.style.width = '100%';
    setTimeout(() => bar.style.width = '0', 400);
    if (d.success) { txs = d.data || []; renderTxs(); updateSummary(); }
  } catch { bar.style.width='0'; toast('❌ Không thể tải dữ liệu','err'); }
}

function renderTxs() {
  const list = document.getElementById('txList');
  let data = [...txs];
  if (curFilter === 'thu') data = data.filter(t => t.type === 'thu');
  else if (curFilter === 'chi') data = data.filter(t => t.type === 'chi');
  else if (curFilter !== 'all') data = data.filter(t => t.category === curFilter);

  if (!data.length) {
    list.innerHTML = `<div class="empty"><div>🔍</div><p>Không có giao dịch nào</p></div>`;
    return;
  }
  list.innerHTML = data.slice(0,60).map(t => `
    <div class="txitem">
      <div class="txicon" style="background:${CAT_COLOR[t.category]||'#64748b'}22">${CAT_ICON[t.category]||'📦'}</div>
      <div class="txinfo">
        <div class="txname">${t.desc||t.category}</div>
        <div class="txmeta">${CAT_ICON[t.category]||''} ${t.category} · ${t.date}${t.note?' · '+t.note:''}</div>
      </div>
      <div class="txamt ${t.type}">${t.type==='thu'?'+':'-'}${fmt(t.amount)}</div>
      <button class="txdel" onclick="delTx('${t.id}')">✕</button>
    </div>`).join('');
}

function updateSummary() {
  const now = new Date();
  const month = txs.filter(t => {
    const d = new Date(t.date);
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  });
  const thu = month.filter(t=>t.type==='thu').reduce((s,t)=>s+t.amount,0);
  const chi = month.filter(t=>t.type==='chi').reduce((s,t)=>s+t.amount,0);
  const du = thu - chi;
  const tiet = thu > 0 ? Math.round((du/thu)*100) : 0;

  document.getElementById('sThu').textContent = fmt(thu);
  document.getElementById('sChi').textContent = fmt(chi);
  document.getElementById('sDu').textContent = fmt(du);
  document.getElementById('sTiet').textContent = tiet + '%';
  document.getElementById('sThuC').textContent = month.filter(t=>t.type==='thu').length + ' khoản';
  document.getElementById('sChiC').textContent = month.filter(t=>t.type==='chi').length + ' khoản';
  document.getElementById('sDuS').textContent = du >= 0 ? '✅ Còn dư tốt' : '⚠️ Vượt ngân sách';
}

async function addTx() {
  if (!API_URL || API_URL === 'PASTE_YOUR_APPS_SCRIPT_URL_HERE') {
    toast('⚠️ Hãy điền API_URL vào trong code','err'); return;
  }
  const desc = document.getElementById('fDesc').value.trim();
  const amt = parseFloat(document.getElementById('fAmt').value);
  const cat = document.getElementById('fCat').value;
  const date = document.getElementById('fDate').value;
  const note = document.getElementById('fNote').value.trim();
  if (!desc) { toast('⚠️ Nhập mô tả','err'); return; }
  if (!amt || amt <= 0) { toast('⚠️ Nhập số tiền hợp lệ','err'); return; }

  const btn = document.getElementById('subBtn');
  const orig = btn.textContent;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Đang lưu...';
  try {
    const r = await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'add',type:curType,category:cat,desc,amount:amt,date,note})});
    const d = await r.json();
    if (d.success) {
      toast('✅ Đã thêm thành công!','ok');
      document.getElementById('fDesc').value='';
      document.getElementById('fAmt').value='';
      document.getElementById('fNote').value='';
      loadData();
    } else toast('❌ Lỗi: '+d.error,'err');
  } catch { toast('❌ Không kết nối được','err'); }
  btn.disabled=false; btn.textContent=orig;
}

async function delTx(id) {
  if (!confirm('Xóa giao dịch này?')) return;
  try {
    const r = await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'delete',id})});
    const d = await r.json();
    if (d.success) { toast('🗑️ Đã xóa','ok'); loadData(); }
    else toast('❌ '+d.error,'err');
  } catch { toast('❌ Lỗi xóa','err'); }
}

// CHARTS
function getMonthData() {
  return txs.filter(t => {
    const d = new Date(t.date);
    return d.getMonth()===curMonth.getMonth() && d.getFullYear()===curMonth.getFullYear();
  });
}

function renderCharts() {
  const mn = curMonth;
  document.getElementById('mnTitle').textContent =
    `Tháng ${mn.getMonth()+1}/${mn.getFullYear()}`;

  const data = getMonthData();
  renderBarChart(data, mn);
  renderPieChart(data);
  renderCatList(data);
}

function changeMonth(dir) {
  curMonth = new Date(curMonth.getFullYear(), curMonth.getMonth()+dir, 1);
  renderCharts();
}

function renderBarChart(data, mn) {
  const weeks = ['Tuần 1','Tuần 2','Tuần 3','Tuần 4'];
  const thu = [0,0,0,0], chi = [0,0,0,0];
  data.forEach(t => {
    const day = new Date(t.date).getDate();
    const w = Math.min(Math.floor((day-1)/7), 3);
    if (t.type==='thu') thu[w]+=t.amount;
    else chi[w]+=t.amount;
  });

  if (chartBar) chartBar.destroy();
  const ctx = document.getElementById('chartBar').getContext('2d');
  chartBar = new Chart(ctx, {
    type:'bar',
    data:{
      labels: weeks,
      datasets:[
        {label:'Thu nhập',data:thu,backgroundColor:'rgba(52,211,153,.7)',borderRadius:6},
        {label:'Chi tiêu',data:chi,backgroundColor:'rgba(248,113,113,.7)',borderRadius:6}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#7a84a0',font:{size:12}}}},
      scales:{
        x:{ticks:{color:'#7a84a0'},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'#7a84a0',callback:v=>fmtShort(v)},grid:{color:'rgba(255,255,255,0.04)'}}
      }
    }
  });
}

function renderPieChart(data) {
  const chi = data.filter(t=>t.type==='chi');
  const bycat = {};
  chi.forEach(t=>{ bycat[t.category]=(bycat[t.category]||0)+t.amount; });
  const labels = Object.keys(bycat);
  const vals = labels.map(l=>bycat[l]);
  const colors = labels.map(l=>CAT_COLOR[l]||'#64748b');

  if (chartPie) chartPie.destroy();
  const ctx = document.getElementById('chartPie').getContext('2d');
  chartPie = new Chart(ctx, {
    type:'doughnut',
    data:{labels, datasets:[{data:vals,backgroundColor:colors,borderWidth:0,hoverOffset:8}]},
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'65%',
      plugins:{
        legend:{position:'right',labels:{color:'#7a84a0',font:{size:11},boxWidth:10,padding:8}},
        tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)}`}}
      }
    }
  });
}

function renderCatList(data) {
  const chi = data.filter(t=>t.type==='chi');
  const bycat = {};
  chi.forEach(t=>{ bycat[t.category]=(bycat[t.category]||0)+t.amount; });
  const total = Object.values(bycat).reduce((s,v)=>s+v,0)||1;
  const sorted = Object.entries(bycat).sort((a,b)=>b[1]-a[1]);

  document.getElementById('catList').innerHTML = sorted.length
    ? sorted.map(([cat,amt])=>`
      <div class="cat-row">
        <div class="cat-label">${CAT_ICON[cat]||'📦'} ${cat}</div>
        <div class="cat-bar-wrap">
          <div class="cat-bar" style="width:${Math.round(amt/total*100)}%;background:${CAT_COLOR[cat]||'#64748b'}"></div>
        </div>
        <div class="cat-amt">${fmt(amt)}</div>
      </div>`).join('')
    : '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Chưa có chi tiêu tháng này</div>';
}

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${type} show`;
  setTimeout(()=>el.classList.remove('show'),3000);
}

init();
</script>
